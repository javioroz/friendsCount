<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>GunDB - Groups</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <!-- Vista de lista de grupos -->
      <section id="view-list">
        <h1>Grupos en GunDB</h1>
        <div id="status">Cargando...</div>
        <ul id="groups"></ul>
      </section>

      <!-- Vista de detalles de un grupo -->
      <section id="view-details" hidden>
        <button id="back-btn" type="button">← Volver a la lista</button>
        <h1 id="details-title">Cargando...</h1>
        <div id="details-status"></div>
        <h2>Datos del grupo (JSON)</h2>
        <pre id="details-json"></pre>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
